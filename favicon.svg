<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Rust for Windows">
  <defs>
    <linearGradient id="g" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#111217"/>
      <stop offset="100%" stop-color="#0b0b0c"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#g)"/>

  <!-- gear-like ring -->
  <g transform="translate(32,32)">
    <circle r="20" fill="none" stroke="#c24a13" stroke-width="6"/>
    <!-- ticks -->
    <g fill="#c24a13">
      <rect x="-2" y="-28" width="4" height="6" rx="1"/>
      <rect x="-2" y="22" width="4" height="6" rx="1"/>
      <rect x="-28" y="-2" width="6" height="4" rx="1"/>
      <rect x="22" y="-2" width="6" height="4" rx="1"/>
      <g transform="rotate(30)"><rect x="-2" y="-28" width="4" height="6" rx="1"/></g>
      <g transform="rotate(60)"><rect x="-2" y="-28" width="4" height="6" rx="1"/></g>
      <g transform="rotate(120)"><rect x="-2" y="-28" width="4" height="6" rx="1"/></g>
      <g transform="rotate(150)"><rect x="-2" y="-28" width="4" height="6" rx="1"/></g>
      <g transform="rotate(210)"><rect x="-2" y="-28" width="4" height="6" rx="1"/></g>
      <g transform="rotate(240)"><rect x="-2" y="-28" width="4" height="6" rx="1"/></g>
      <g transform="rotate(300)"><rect x="-2" y="-28" width="4" height="6" rx="1"/></g>
      <g transform="rotate(330)"><rect x="-2" y="-28" width="4" height="6" rx="1"/></g>
    </g>
  </g>

  <!-- Monogram R -->
  <g filter="url(#s)">
    <text x="32" y="39" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" fill="#f5f5f5">R</text>
  </g>
</svg>
